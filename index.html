<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing board</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="controls">

      <div id="color-picker-container" class="tool">
        <label class="control-label">Color</label>
        <div class="wrapper">
          <span id="r-span">R</span><input type="range" min="0" max="255" value="0" id="red" oninput="colors()" autocomplete="off">
          <span id="red-value">0</span>
        </div>
        <div class="wrapper">
          <span id="g-span">G</span><input type="range" min="0" max="255" value="0" id="green" oninput="colors()" autocomplete="off">
          <span id="green-value">0</span>
        </div>
        <div class="wrapper">
          <span id=b-span>B</span><input type="range" min="0" max="255" value="0" id="blue" oninput="colors()" autocomplete="off">
          <span id="blue-value">0</span>
        </div>
        <span id="preview"></span>
      </div>

      <div id="switches">

        <div id="width-div" class="tool">
          <label class="control-label" id="width-label">Width: 10</label>
          <input type="range" autocomplete="off" id="width-picker" value="10" min="1" max="100" onchange="updateVal(this.value)">
        </div>

        <div id="toggles">
          <div id="brush-toggle-div" class="tool toggle">
            <button id="brush-btn" class="toggle-btn active">Brush</button>
          </div>

          <div id="erase-toggle-div" class="tool toggle">
            <button id="erase-btn" class="toggle-btn">Erase</button>
            <!--<label class="control-label">Erase</label>
            <label class="switch">
              <input type="checkbox" id="erase-toggle" autocomplete="off">
              <span class="slider"></span>
            </label>-->
          </div>

          <div id="fill-toggle-div" class="tool toggle">
            <button id="fill-btn" class="toggle-btn">Fill</button>
            <!--<label class="control-label">Fill</label>
            <label class="switch">
              <input type="checkbox" id="fill-toggle" autocomplete="off">
              <span class="slider"></span>
            </label>-->
          </div>
        </div>

        <div id="clear-div" class="tool">
          <button id="clear" class="btn" onclick="clear()">Clear</button>
        </div>

      </div>
    </div>


  </body>
  <script type="text/javascript" src="index.js"></script>
</html>
